<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeroom Attendance Report — Mizzentop</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1a2744;
      --cream: #f7f3ec;
      --muted: #6b7280;
      --white: #ffffff;
      --border: #e5e1da;
      --light-bg: #f0ece4;
      --green: #2e7d32;
      --red: #c0392b;
      --gold: #b8860b;
    }
    html, body { min-height: 100vh; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--navy); }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; background: var(--navy); color: var(--white);
    }
    .topbar a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 13px; font-weight: 500; }
    .topbar a:hover { color: var(--white); }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }

    .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }

    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; margin-bottom: 6px; }
    .page-header p { color: var(--muted); font-size: 14px; }

    .controls {
      display: flex; gap: 12px; align-items: end; flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-group label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted);
    }
    .control-group select {
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--white);
      color: var(--navy); min-width: 240px;
    }
    .controls-spacer { flex: 1; }

    .btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s ease;
    }
    .btn-secondary { background: var(--white); color: var(--navy); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--light-bg); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .summary-line {
      font-size: 13px; color: var(--muted); margin-bottom: 14px;
      font-weight: 500;
    }
    .summary-line strong { color: var(--navy); font-weight: 600; }

    .table-wrap {
      background: var(--white); border-radius: 10px;
      border: 1px solid var(--border); overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      position: sticky; top: 0;
      background: var(--light-bg); color: var(--navy);
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 12px 14px; text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th.num { text-align: right; }
    thead th.absent-col { background: #fbeae6; color: #8a2a1c; }

    tbody td {
      padding: 11px 14px; font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafaf6; }

    td.num {
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }
    td.num.has-present { color: var(--green); font-weight: 600; }
    td.num.has-absent  { color: var(--red); font-weight: 600; }
    td.num.has-not-marked { color: var(--gold); font-weight: 600; }

    td.grade {
      font-size: 12px; color: var(--muted); font-weight: 500;
    }

    .empty-state, .loading-state {
      text-align: center; padding: 48px 24px; color: var(--muted);
      font-size: 15px;
    }

    /* ── Detail modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal-panel {
      background: var(--white); border-radius: 12px;
      max-width: 720px; width: 100%; padding: 24px;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); line-height: 1; }
    .close-btn:hover { color: var(--navy); }

    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; font-size: 12px; color: var(--navy); }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    .month-block { margin-bottom: 24px; }
    .month-block h3 {
      font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700;
      margin-bottom: 8px; color: var(--navy);
    }
    .weekday-row, .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .weekday-row .wd {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      color: var(--muted); text-align: center; padding: 4px 0;
    }
    .day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500; border-radius: 4px;
      background: var(--light-bg); color: var(--navy);
    }
    .day.blank { background: transparent; }
    .day.out-of-window { background: transparent; color: #d4d0c8; font-weight: 300; }
    .day.no-school { background: var(--light-bg); color: #b8b3aa; font-weight: 300; }
    .day.not-marked { background: var(--white); border: 1.5px solid var(--red); color: var(--red); }

    tbody tr { cursor: pointer; }

    @media (max-width: 720px) {
      .controls { flex-direction: column; align-items: stretch; }
      .control-group select { min-width: unset; width: 100%; }
      .controls-spacer { display: none; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 1100px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/">← Home</a>
  <span class="topbar-title">Homeroom Attendance Report</span>
  <span></span>
</div>

<div class="container">
  <div class="page-header">
    <h1>Homeroom Attendance Report</h1>
    <p>3rd Trimester · February 23 – June 12, 2026</p>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Homeroom Teacher</label>
      <select id="teacher-select">
        <option value="">— Select —</option>
      </select>
    </div>
    <div class="controls-spacer"></div>
    <button class="btn btn-secondary" id="download-csv-btn" disabled>Download CSV</button>
  </div>

  <div class="summary-line" id="summary-line" style="display:none;"></div>

  <div class="table-wrap" id="table-wrap">
    <div class="empty-state">Select a homeroom teacher to view the report.</div>
  </div>
</div>

<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this) closeDetail()">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="detail-modal-title"></h2>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#2e7d32;"></span>Present</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#c0392b;"></span>Absent</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#ea580c;"></span>Tardy</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#d97706;"></span>Excused Tardy</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#7c3aed;"></span>Early Dismissal</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#b8860b;"></span>Excused</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#2563eb;"></span>Field Trip</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#94a3b8;"></span>NSD</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#ffffff; border:1.5px solid #c0392b;"></span>Not Marked</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#f0ece4;"></span>Not a School Day</span>
    </div>
    <div id="detail-modal-body"></div>
  </div>
</div>

<script>
const API = '';
let currentTeacherId = null;
let currentReportData = null;

document.addEventListener('DOMContentLoaded', async () => {
  const sel = document.getElementById('teacher-select');

  const [sessionRes, teachersRes] = await Promise.all([
    fetch('/api/session').then(r => r.json()),
    fetch('/api/homeroom-attendance/teachers').then(r => r.json())
  ]);

  teachersRes.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.staff_id;
    opt.textContent = `${t.first_name} ${t.last_name}`;
    sel.appendChild(opt);
  });

  const match = teachersRes.find(t => t.email === sessionRes.email);
  if (match) {
    sel.value = match.staff_id;
    onTeacherChange();
  }

  sel.addEventListener('change', onTeacherChange);
  document.getElementById('download-csv-btn').addEventListener('click', downloadCsv);
});

async function onTeacherChange() {
  currentTeacherId = document.getElementById('teacher-select').value;
  document.getElementById('download-csv-btn').disabled = !currentTeacherId;
  if (!currentTeacherId) {
    renderEmpty('Select a homeroom teacher to view the report.');
    return;
  }
  await loadReport();
}

async function loadReport() {
  document.getElementById('summary-line').style.display = 'none';
  document.getElementById('table-wrap').innerHTML = '<div class="loading-state">Loading…</div>';

  const res = await fetch(`${API}/api/homeroom-attendance-report?teacher_id=${currentTeacherId}`);
  currentReportData = await res.json();

  if (currentReportData.error) {
    renderEmpty(currentReportData.error);
    return;
  }
  renderReport(currentReportData);
}

function renderEmpty(msg) {
  document.getElementById('summary-line').style.display = 'none';
  document.getElementById('table-wrap').innerHTML = `<div class="empty-state">${escapeHtml(msg)}</div>`;
}

function renderReport(data) {
  const wrap = document.getElementById('table-wrap');
  const summary = document.getElementById('summary-line');

  if (!data.students || data.students.length === 0) {
    summary.style.display = 'none';
    wrap.innerHTML = '<div class="empty-state">No active students assigned to this homeroom.</div>';
    return;
  }

  summary.style.display = 'block';
  summary.innerHTML = `<strong>${data.homeroom_school_days}</strong> school days in window · <strong>${data.students.length}</strong> students`;

  let html = '<table>';
  html += '<thead><tr>';
  html += '<th>Last Name</th><th>First Name</th><th>Grade</th>';
  html += '<th class="num">Present</th>';
  html += '<th class="num absent-col">Absent</th>';
  html += '<th class="num">Tardy</th>';
  html += '<th class="num">Exc. Tardy</th>';
  html += '<th class="num">Early Dis.</th>';
  html += '<th class="num">Excused</th>';
  html += '<th class="num">Field Trip</th>';
  html += '<th class="num">NSD</th>';
  html += '<th class="num">Not Marked</th>';
  html += '<th class="num">School Days</th>';
  html += '</tr></thead><tbody>';

  data.students.forEach(s => {
    html += `<tr onclick="openStudentDetail(${s.student_id})">`;
    html += `<td>${escapeHtml(s.last_name)}</td>`;
    html += `<td>${escapeHtml(s.first_name)}</td>`;
    html += `<td class="grade">${escapeHtml(String(s.grade ?? ''))}</td>`;
    html += `<td class="num${s.present > 0 ? ' has-present' : ''}">${s.present}</td>`;
    html += `<td class="num${s.absent > 0 ? ' has-absent' : ''}">${s.absent}</td>`;
    html += `<td class="num">${s.tardy}</td>`;
    html += `<td class="num">${s.excused_tardy}</td>`;
    html += `<td class="num">${s.ed}</td>`;
    html += `<td class="num">${s.excused}</td>`;
    html += `<td class="num">${s.field_trip}</td>`;
    html += `<td class="num">${s.nsd}</td>`;
    html += `<td class="num${s.not_marked > 0 ? ' has-not-marked' : ''}">${s.not_marked}</td>`;
    html += `<td class="num">${s.school_days}</td>`;
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function downloadCsv() {
  if (!currentTeacherId) return;
  window.location.href = `/api/homeroom-attendance-report.csv?teacher_id=${currentTeacherId}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Per-student detail modal ──
const STATUS_COLORS = {
  present:       { bg: '#2e7d32', label: 'Present' },
  absent:        { bg: '#c0392b', label: 'Absent' },
  tardy:         { bg: '#ea580c', label: 'Tardy' },
  excused_tardy: { bg: '#d97706', label: 'Excused Tardy' },
  ed:            { bg: '#7c3aed', label: 'Early Dismissal' },
  excused:       { bg: '#b8860b', label: 'Excused' },
  field_trip:    { bg: '#2563eb', label: 'Field Trip' },
  nsd:           { bg: '#94a3b8', label: 'NSD' },
};
const detailCache = {};

async function openStudentDetail(studentId) {
  document.getElementById('detail-modal').classList.add('open');
  document.getElementById('detail-modal-body').innerHTML = '<div class="loading-state">Loading…</div>';
  document.getElementById('detail-modal-title').textContent = '';

  if (!detailCache[studentId]) {
    const res = await fetch(`/api/homeroom-attendance-report/student/${studentId}`);
    detailCache[studentId] = await res.json();
  }
  renderDetail(detailCache[studentId]);
}

function renderDetail(data) {
  const byDate = {};
  data.records.forEach(r => { byDate[r.date] = r; });
  const schoolDateSet = new Set(data.school_dates);

  document.getElementById('detail-modal-title').textContent =
    `${data.student.first_name} ${data.student.last_name} · Grade ${data.student.grade}`;

  // JS month is 0-indexed: Feb=1, Jun=5
  const months = [
    { year: 2026, month: 1, name: 'February 2026' },
    { year: 2026, month: 2, name: 'March 2026'    },
    { year: 2026, month: 3, name: 'April 2026'    },
    { year: 2026, month: 4, name: 'May 2026'      },
    { year: 2026, month: 5, name: 'June 2026'     },
  ];
  const start = data.start_date, end = data.end_date;

  let html = '';
  months.forEach(m => {
    html += `<div class="month-block"><h3>${m.name}</h3>`;
    html += `<div class="weekday-row">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="wd">${d}</div>`).join('')}</div>`;
    html += `<div class="day-grid">`;

    const firstDay = new Date(m.year, m.month, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(m.year, m.month + 1, 0).getDate();

    for (let i = 0; i < startWeekday; i++) html += `<div class="day blank"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${m.year}-${String(m.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const inWindow = dateStr >= start && dateStr <= end;
      let cls = 'day';
      let style = '';
      let tooltip = dateStr;
      if (!inWindow) {
        cls += ' out-of-window';
      } else if (byDate[dateStr]) {
        const rec = byDate[dateStr];
        const c = STATUS_COLORS[rec.status];
        if (c) {
          style = `background:${c.bg}; color:white;`;
          tooltip = `${dateStr} · ${c.label}${rec.notes ? ' · ' + rec.notes : ''}`;
        } else {
          tooltip = `${dateStr} · ${rec.status}${rec.notes ? ' · ' + rec.notes : ''}`;
        }
      } else if (schoolDateSet.has(dateStr)) {
        cls += ' not-marked';
        tooltip = `${dateStr} · Not Marked`;
      } else {
        cls += ' no-school';
      }
      html += `<div class="${cls}" style="${style}" title="${tooltip}">${d}</div>`;
    }
    html += `</div></div>`;
  });

  document.getElementById('detail-modal-body').innerHTML = html;
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});
</script>
</body>
</html>
